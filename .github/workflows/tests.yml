name: SquadVault CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # This creates the temporary database "container" on GitHub
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: squadvault_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Database Schema (Populate)
        run: node db/populateDB.js
        env:
          # These must match the 'services' block above
          DB_USER: postgres
          DB_HOST: localhost
          DB_NAME: squadvault_test
          DB_PASSWORD: password
          DB_PORT: 5432

      - name: Run Integration Tests
        run: npm test
        env:
          # Your app uses this connection string thanks to our pool.js update
          DATABASE_URL: postgres://postgres:password@localhost:5432/squadvault_test
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'github_actions_test_secret' }}
          NODE_ENV: test

      - name: Upload Coverage Report (Optional)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/